name: Publish ntf-sample-plugin to PyPI

on:
  push:
    tags:
      - "ntf-sample-plugin-v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Tag Matches Version
        run: |
          $tag = "${{ github.ref_name }}".Replace("ntf-sample-plugin-v", "")
          $ver = (python -c "import configparser; c=configparser.ConfigParser(); c.read('plugins/ntf_sample_plugin/setup.cfg'); print(c['metadata']['version'])").Trim()
          if ($tag -ne $ver) {
            Write-Error "Tag ntf-sample-plugin-v$tag does not match plugin version $ver"
          }
        shell: pwsh

      - name: Build
        run: |
          python -m pip install --upgrade pip "setuptools<69" wheel
          rm -rf dist build *.egg-info
          python setup.py sdist bdist_wheel
        working-directory: plugins/ntf_sample_plugin

      - name: Inspect Wheel Metadata
        run: |
          python - <<'PY'
          import pathlib, zipfile
          dist = pathlib.Path("plugins/ntf_sample_plugin/dist")
          wheel = next(dist.glob("*.whl"))
          with zipfile.ZipFile(wheel) as zf:
              meta = next(n for n in zf.namelist() if n.endswith("METADATA"))
              text = zf.read(meta).decode("utf-8", "replace")
          print("WHEEL:", wheel.name)
          print("METADATA head:")
          print("\n".join(text.splitlines()[:20]))
          if "Name:" not in text or "Version:" not in text:
              raise SystemExit("Missing Name/Version in METADATA")
          PY

      - name: Upload Dist
        uses: actions/upload-artifact@v4
        with:
          name: ntf-sample-plugin-dist
          path: plugins/ntf_sample_plugin/dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@v1.10.0
        with:
          packages-dir: plugins/ntf_sample_plugin/dist/
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true
