name: Publish ntf-sample-plugin to PyPI

on:
  push:
    tags:
      - "ntf-sample-plugin-v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Tag Matches Version
        run: |
          $tag = "${{ github.ref_name }}".Replace("ntf-sample-plugin-v", "")
          $ver = (python -c "import configparser; c=configparser.ConfigParser(); c.read('plugins/ntf_sample_plugin/setup.cfg'); print(c['metadata']['version'])").Trim()
          if ($tag -ne $ver) {
            Write-Error "Tag ntf-sample-plugin-v$tag does not match plugin version $ver"
          }
        shell: pwsh

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
        working-directory: plugins/ntf_sample_plugin

      - name: Upload Dist
        uses: actions/upload-artifact@v4
        with:
          name: ntf-sample-plugin-dist
          path: plugins/ntf_sample_plugin/dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@v1.10.0
        with:
          packages-dir: plugins/ntf_sample_plugin/dist/
